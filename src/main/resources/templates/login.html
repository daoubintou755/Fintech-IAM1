<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Connexion - Fintech IAM</title>


    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">



    <style>


:root{

    --olive:#556b2f;
    --olive-light:#6b8e23;
    --bg:#f4f7ef;

}



body{

    min-height:100vh;

    background:linear-gradient(135deg,#f4f7ef,#dfe8c9);

    font-family:'Segoe UI',sans-serif;

    display:flex;

    align-items:center;

    justify-content:center;

}






/* CARTE LOGIN */


.login-card{


    width:420px;

    border:none;

    border-radius:30px;

    overflow:hidden;

    box-shadow:0 15px 40px rgba(0,0,0,.15);

}






/* HEADER */


.login-header{


    background:linear-gradient(135deg,#556b2f,#6b8e23);

    color:white;

    text-align:center;

    padding:35px;


}



.login-header i{


    font-size:55px;


}




.login-header h3{


    font-weight:700;

    margin-top:15px;


}





/* BODY */


.card-body{


    padding:40px;

}







.form-label{


    font-weight:600;

    color:#44551f;


}





.form-control{


    border-radius:15px;

    padding:13px;

    border:1px solid #ddd;


}



.form-control:focus{


    border-color:#6b8e23;

    box-shadow:0 0 0 .25rem rgba(107,142,35,.25);


}







/* BOUTON */


.btn-olive{


    background:#6b8e23;

    color:white;

    border:none;

    border-radius:15px;

    padding:13px;

    font-weight:600;

    transition:.3s;


}




.btn-olive:hover{


    background:#556b2f;

    color:white;

    transform:translateY(-2px);


}







.footer-text{


    text-align:center;

    color:#777;

    font-size:14px;

    margin-top:20px;


}



</style>


</head>





<body>





<div class="login-card card">





    <!-- HEADER -->

    <div class="login-header">


        <i class="bi bi-shield-lock-fill"></i>


        <h3>

            Fintech IAM

        </h3>


        <p class="mb-0">

            Connexion sécurisée

        </p>


    </div>








    <!-- FORMULAIRE -->


    <div class="card-body">



        <form th:action="@{/login}" method="post">





            <div class="mb-4">


                <label class="form-label">

                    <i class="bi bi-person"></i>

                    Nom d'utilisateur

                </label>



                <input type="text"

                       name="username"

                       class="form-control"

                       placeholder="Votre identifiant"

                       required>


            </div>









            <div class="mb-4">


                <label class="form-label">


                    <i class="bi bi-lock"></i>

                    Mot de passe


                </label>



                <input type="password"

                       name="password"

                       class="form-control"

                       placeholder="********"

                       required>


            </div>









            <button type="submit"

                    class="btn btn-olive w-100">


                <i class="bi bi-box-arrow-in-right"></i>


                Se connecter


            </button>





        </form>





        <div class="footer-text">


            © Fintech IAM - Gestion financière sécurisée


        </div>





    </div>






</div>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>


</html>
