<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Détails Client - Fintech IAM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
        body { background: #f3f5ef; }
        .card { border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .table thead { background: #556b2f; color: white; }
    </style>
</head>
<body class="p-4">

<div class="container">
  <div class="d-flex justify-content-between mb-4">
    <h2><i class="bi bi-person-badge"></i> Détails : [[${client.nom}]]</h2>
    <a href="/agent/dashboard" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Retour</a>
  </div>

  <div class="card p-4 mb-4">
    <h5>Informations Personnelles</h5>
    <hr>
    <p><strong>Téléphone :</strong> [[${client.telephone}]]</p>
    <p><strong>Adresse :</strong> [[${client.adresse}]]</p>
  </div>

  <div class="card p-4">
    <h4>Historique des Transactions</h4>
    <div class="table-responsive mt-3">
      <table class="table table-hover">
        <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Montant</th>
          <th>Code</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${transactions}">
          <td th:text="${#temporals.format(t.date, 'dd/MM/yyyy HH:mm')}"></td>
          <td>
                            <span class="badge" th:classappend="${t.type == 'RETRAIT' ? 'bg-danger' : 'bg-success'}">
                                [[${t.type}]]
                            </span>
          </td>
          <td class="fw-bold" th:text="${#numbers.formatDecimal(t.amount, 1, 'WHITESPACE', 0, 'POINT') + ' FCFA'}"></td>
          <td th:text="${t.code}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
