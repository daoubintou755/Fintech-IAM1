<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SallePro - Gestion des Salles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4 shadow">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand fw-bold" href="#">🏋️‍♂️ SallePro Manager</a>

        <div class="text-white">
            <div th:if="${username != null}">
                👤 Connecté : <strong class="text-warning" th:text="${username}">User</strong>
                <a th:href="@{/logout}" class="btn btn-sm btn-danger ms-2">Déconnexion</a>
            </div>
            <div th:if="${username == null}">
                <a th:href="@{/login}" class="btn btn-sm btn-light fw-bold">🔑 Se connecter</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">

        <div class="col-md-4 mb-4" th:if="${estAutorise}">

            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white text-primary fw-bold border-bottom-0 pt-3" id="formSalleTitle">
                    Ajouter une nouvelle salle
                </div>
                <div class="card-body">
                    <form th:action="@{/ajouter}" th:object="${nouvelleSalle}" method="POST" id="formSalle">

                        <input type="hidden" th:field="*{id}" id="salleId">

                        <div class="mb-3">
                            <label class="form-label text-muted">Nom de la salle</label>
                            <input type="text" th:field="*{nom}" id="salleNom" class="form-control" placeholder="Ex: GigaFit" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Adresse</label>
                            <input type="text" th:field="*{adresse}" id="salleAdresse" class="form-control" placeholder="Ex: Rue des sports" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Horaires d'ouverture</label>
                            <input type="text" th:field="*{horairesOuverture}" id="salleHoraires" class="form-control" placeholder="Ex: 06h00 - 23h00" required>
                        </div>
                        <button type="submit" id="btnSubmitSalle" class="btn btn-success w-100 mt-2 shadow-sm">➕ Enregistrer la salle</button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm border-0 border-top border-warning border-3" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                <div class="card-header bg-white text-warning fw-bold border-bottom-0 pt-3">
                    👑 Créer un compte Manager
                </div>
                <div class="card-body">
                    <form th:action="@{/ajouter-manager}" th:object="${nouvelUtilisateur}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted">Nom d'utilisateur</label>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="Ex: manager_salle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Mot de passe</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Mot de passe sécurisé" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 mt-2 shadow-sm text-dark fw-bold">✨ Créer le Manager</button>
                    </form>
                </div>
            </div>

        </div>

        <div th:class="${estAutorise} ? 'col-md-8' : 'col-md-12'">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white text-dark fw-bold border-bottom-0 pt-3">
                    Liste de nos complexes sportifs
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th>Adresse</th>
                                <th>Horaires</th>
                                <th th:if="${estAutorise}">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="salle : ${salles}">
                                <td class="fw-bold text-secondary" th:text="${salle.id}">1</td>
                                <td class="fw-bold text-primary" th:text="${salle.nom}">Fitness Park</td>
                                <td th:text="${salle.adresse}">Sébénikoro</td>
                                <td><span class="badge bg-info text-dark" th:text="${salle.horairesOuverture}">07h00 - 22h00</span></td>

                                <th:block th:if="${estAutorise}">
                                    <td>
                                        <div class="d-flex gap-1">
                                            <button class="btn btn-sm btn-warning fw-bold text-dark shadow-sm btn-modifier"
                                                    th:data-id="${salle.id}"
                                                    th:data-nom="${salle.nom}"
                                                    th:data-adresse="${salle.adresse}"
                                                    th:data-horaires="${salle.horairesOuverture}"
                                                    onclick="chargerDonnees(this)">
                                                ✏️ Modifier
                                            </button>

                                            <form th:action="@{/supprimer/{id}(id=${salle.id})}" method="POST" onsubmit="return confirm('Voulez-vous vraiment supprimer cette salle ?');" style="display:inline;">
                                                <button type="submit" class="btn btn-sm btn-danger shadow-sm">🗑️ Supprimer</button>
                                            </form>
                                        </div>
                                    </td>
                                </th:block>
                            </tr>
                            <tr th:if="${#lists.isEmpty(salles)}">
                                <td colspan="5" class="text-center text-muted p-4">Aucune salle disponible pour le moment.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function chargerDonnees(button) {
    // Extraction propre des attributs HTML5 sans passer par Thymeleaf côté JS
    const id = button.getAttribute('data-id');
    const nom = button.getAttribute('data-nom');
    const adresse = button.getAttribute('data-adresse');
    const horaires = button.getAttribute('data-horaires');

    // 1. Changement visuel du formulaire
    document.getElementById('formSalleTitle').innerText = "📝 Modifier la salle N° " + id;
    document.getElementById('btnSubmitSalle').className = "btn btn-warning w-100 mt-2 shadow-sm text-dark fw-bold";
    document.getElementById('btnSubmitSalle').innerText = "💾 Appliquer les modifications";

    // 2. Remplissage des inputs
    document.getElementById('salleId').value = id;
    document.getElementById('salleNom').value = nom;
    document.getElementById('salleAdresse').value = adresse;
    document.getElementById('salleHoraires').value = horaires;

    // 3. Défilement
    document.getElementById('formSalle').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
