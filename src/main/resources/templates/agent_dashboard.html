<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Fintech IAM</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">


    <style>


body{

background:#f3f5ef;
font-family:'Segoe UI',sans-serif;

}


/* Sidebar */

.sidebar{

height:100vh;
position:fixed;
background:#556b2f;
color:white;

}


.logo{

font-weight:bold;
letter-spacing:2px;

}



.nav-link{

color:white;
padding:12px;
border-radius:12px;
transition:.3s;

}


.nav-link:hover{

background:#6b8e23;
color:white;

}



.main-content{

margin-left:16.66%;
padding:30px;

}



/* cartes */


.card{

border:none;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);

}




.btn-olive{

background:#6b8e23;
color:white;
border:none;

}


.btn-olive:hover{

background:#556b2f;
color:white;

}



.table thead{

background:#556b2f;
color:white;

}



.modal-content{

border-radius:20px;

}



.header-card{

background:linear-gradient(135deg,#556b2f,#8fbc8f);
color:white;
border-radius:20px;
padding:25px;

}


</style>


</head>



<body>



<div class="container-fluid">

    <div class="row">



        <!-- MENU -->


        <nav class="col-md-2 sidebar p-4">


            <h3 class="text-center logo mb-5">

                <i class="bi bi-bank"></i>

                Fintech IAM

            </h3>




            <a href="/agent/dashboard" class="nav-link mb-3">

                <i class="bi bi-speedometer2"></i>

                Tableau de bord

            </a>


            <hr>




            <button class="btn btn-light w-100 mb-3"
                    data-bs-toggle="modal"
                    data-bs-target="#clientModal">

                <i class="bi bi-person-plus"></i>

                Ajouter Client

            </button>




            <button class="btn btn-light w-100 mb-3"
                    data-bs-toggle="modal"
                    data-bs-target="#cycleModal">

                <i class="bi bi-repeat"></i>

                Créer Cycle

            </button>




            <button class="btn btn-light w-100 mb-3"
                    data-bs-toggle="modal"
                    data-bs-target="#depotModal">

                <i class="bi bi-wallet2"></i>

                Faire Dépôt

            </button>




            <button class="btn btn-light w-100 mb-3"
                    data-bs-toggle="modal"
                    data-bs-target="#retraitModal">

                <i class="bi bi-cash-stack"></i>

                Faire Retrait

            </button>




            <form th:action="@{/logout}" method="post" class="mt-5">


                <button class="btn btn-dark w-100">

                    <i class="bi bi-box-arrow-right"></i>

                    Déconnexion

                </button>


            </form>



        </nav>






        <!-- CONTENU -->


        <main class="col-md-10 main-content">



            <div class="header-card mb-4">


                <h2>

                    <i class="bi bi-graph-up"></i>

                    Vue d'ensemble

                </h2>


                <p>

                    Gestion clients - cycles - dépôts - retraits

                </p>


            </div>





            <!-- MESSAGE -->


            <div th:if="${message}"
                 class="alert alert-success shadow-sm">


                <i class="bi bi-check-circle"></i>

                <span th:text="${message}"></span>


            </div>





            <div th:if="${error}"
                 class="alert alert-danger">


                <i class="bi bi-warning"></i>

                <span th:text="${error}"></span>


            </div>






            <!-- CLIENTS -->


            <div class="card p-4 mb-4">


                <h4 class="mb-3">

                    <i class="bi bi-people"></i>

                    Liste des Clients

                </h4>




                <div class="table-responsive">


                    <table class="table table-hover">


                        <thead>

                        <tr>

                            <th>Nom</th>

                            <th>Téléphone</th>

                            <th>Solde</th>

                            <th>Action</th>
                            <th>statut</th>


                        </tr>

                        </thead>



                        <tbody>


                        <tr th:each="client:${clients}">


                            <td th:text="|${client.nom} ${client.prenom}|"></td>


                            <td th:text="${client.telephone}"></td>



                            <td>


<span class="badge"
      style="background:#6b8e23"
      th:text="${client.soldeActuel+' FCFA'}">


</span>


                            </td>



                            <td>


                                <a class="btn btn-sm btn-olive"

                                   th:href="@{/agent/client/details/{id}(id=${client.id})}">


                                    <i class="bi bi-eye"></i>

                                    Historique


                                </a>


                            </td>


                        </tr>


                        </tbody>



                    </table>


                </div>



            </div>






            <table class="table">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Client</th>
                    <th>Type</th>
                    <th>Cycle</th> <th>Statut Cycle</th> <th>Montant</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t:${transactions}">
                    <td th:text="${t.date != null ? #temporals.format(t.date, 'dd/MM/yyyy HH:mm') : 'N/A'}"></td>
                    <td th:text="${t.client != null ? (t.client.nom + ' ' + t.client.prenom) : 'Inconnu'}"></td>
                    <td th:text="${t.type}"></td>

                    <td th:text="${t.cycle != null ? t.cycle.nom : 'Hors cycle'}"></td>

                    <td>
                <span th:if="${t.cycle != null}"
                      th:text="${t.cycle.status}"
                      th:class="${t.cycle.status == 'EN_COURS' ? 'badge bg-success' : 'badge bg-secondary'}">
                </span>
                        <span th:if="${t.cycle == null}" class="badge bg-light text-dark">N/A</span>
                    </td>

                    <td th:class="${t.type=='RETRAIT'?'text-danger':'text-success'}"
                        th:text="${t.amount != null ? #numbers.formatDecimal(t.amount, 1, 0) + ' FCFA' : '0 FCFA'}">
                    </td>
                </tr>
                </tbody>
            </table>






<



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>



<div class="modal fade" id="clientModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header text-white" style="background:#556b2f">
                <h5 class="modal-title"><i class="bi bi-person-plus"></i> Inscrire un client</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/agent/client/add}" method="post">
                <div class="modal-body p-4">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nom</label>
                            <input type="text" name="nom" class="form-control rounded-3" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prénom</label>
                            <input type="text" name="prenom" class="form-control rounded-3" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Genre</label>
                            <select name="genre" class="form-select rounded-3">
                                <option value="M">Masculin</option>
                                <option value="F">Féminin</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Date Naissance</label>
                            <input type="date" name="dateNaissance" class="form-control rounded-3" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Téléphone</label>
                        <input type="tel" name="telephone" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="email" class="form-control rounded-3">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Adresse</label>
                        <input type="text" name="adresse" class="form-control rounded-3">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn text-white rounded-3" style="background:#6b8e23">
                        <i class="bi bi-check-circle"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="cycleModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header text-white" style="background:#6b8e23">
                <h5 class="modal-title"><i class="bi bi-repeat"></i> Lancer un Cycle</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/agent/cycle/add}" method="post">
                <div class="modal-body p-4">
                    <label class="form-label fw-bold">Client</label>
                    <select name="clientId" class="form-select rounded-3 mb-3" required>
                        <option th:each="c : ${allClients}"
                                th:value="${c.id}"
                                th:text="${c.nom + ' ' + (c.prenom != null ? c.prenom : '')}">
                        </option>
                    </select>
                    <label class="form-label fw-bold">Nom du Cycle</label>
                    <input type="text" name="nom" class="form-control rounded-3 mb-3" required>
                    <label class="form-label fw-bold">Mise unitaire (FCFA)</label>
                    <input type="number"
                           name="montantBase"
                           class="form-control rounded-3"
                           min="100"
                           step="100"
                           placeholder="Ex: 1000 FCFA"
                           required>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn text-white rounded-3" style="background:#556b2f">
                        <i class="bi bi-play-circle"></i> Lancer le cycle
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- MODALE DEPOT -->

<div class="modal fade" id="depotModal" tabindex="-1" aria-hidden="true">


    <div class="modal-dialog modal-dialog-centered">


        <div class="modal-content border-0 shadow-lg rounded-4">



            <!-- HEADER -->

            <div class="modal-header text-white"
                 style="background:linear-gradient(135deg,#556b2f,#6b8e23)">



                <h5 class="modal-title fw-bold">

                    <i class="bi bi-wallet2"></i>

                    Enregistrer Dépôt

                </h5>



                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">

                </button>



            </div>






            <form th:action="@{/agent/depot/add}" method="post">


                <div class="modal-body p-4">



                    <div class="mb-4">


                        <label class="form-label fw-bold">

                            <i class="bi bi-arrow-repeat text-success"></i>

                            Cycle actif

                        </label>



                        <select name="cycleId"
                                class="form-select rounded-3 shadow-sm"
                                required>



                            <option th:each="cy : ${cycles}"
                                    th:value="${cy.id}"
                                    th:text="${cy.nom + ' (' + cy.client.nom + ')'}">

                            </option>



                        </select>


                    </div>







                    <div class="mb-3">


                        <label class="form-label fw-bold">


                            <i class="bi bi-cash-stack text-success"></i>

                            Nombre de mises


                        </label>




                        <input type="number"
                               name="nbMises"
                               class="form-control rounded-3 shadow-sm"
                               min="1"
                               placeholder="Ex: 5"
                               required>



                    </div>





                </div>







                <div class="modal-footer bg-light">



                    <button type="submit"
                            class="btn text-white rounded-3 px-4"
                            style="background:#6b8e23">


                        <i class="bi bi-check-circle"></i>


                        Valider Dépôt


                    </button>



                </div>





            </form>



        </div>


    </div>


</div>
<!-- MODALE RETRAIT -->

<div class="modal fade" id="retraitModal" tabindex="-1" aria-hidden="true">


    <div class="modal-dialog modal-dialog-centered">


        <div class="modal-content border-0 shadow-lg rounded-4">



            <!-- HEADER -->

            <div class="modal-header text-white"
                 style="background:linear-gradient(135deg,#556b2f,#6b8e23)">



                <h5 class="modal-title fw-bold">


                    <i class="bi bi-cash-stack"></i>


                    Effectuer Retrait


                </h5>




                <button type="button"

                        class="btn-close btn-close-white"

                        data-bs-dismiss="modal">


                </button>



            </div>







            <form th:action="@{/agent/retrait/add}" method="post">



                <div class="modal-body p-4">





                    <div class="mb-4">



                        <label class="form-label fw-bold">


                            <i class="bi bi-person text-success"></i>


                            Client



                        </label>





                        <select name="clientId"

                                class="form-select rounded-3 shadow-sm"

                                required>



                            <option th:each="c : ${allClients}"

                                    th:value="${c.id}"

                                    th:text="${c.nom + ' ' + (c.prenom != null ? c.prenom : '')}">

                            </option>



                        </select>



                    </div>









                    <div class="mb-3">



                        <label class="form-label fw-bold">


                            <i class="bi bi-currency-exchange text-success"></i>


                            Montant (FCFA)



                        </label>





                        <input type="number"

                               name="montant"

                               class="form-control rounded-3 shadow-sm"

                               placeholder="Ex: 5000"

                               step="100"

                               required>



                    </div>







                </div>









                <div class="modal-footer bg-light">





                    <button type="submit"

                            class="btn text-white rounded-3 px-4"

                            style="background:#6b8e23">



                        <i class="bi bi-cash"></i>


                        Valider Retrait



                    </button>




                </div>





            </form>





        </div>


    </div>


</div>
</body>
</html>
